name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (static export)
        run: npm run build
        env:
          NODE_ENV: production

      # .nojekyll prevents GitHub Pages from ignoring _next/ directory
      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      # 404.html is copied from public/ by Next.js automatically,
      # but ensure it's there for SPA redirect fallback
      - name: Verify 404.html exists
        run: |
          if [ ! -f ./out/404.html ]; then
            cp ./public/404.html ./out/404.html
            echo "Copied 404.html to out/"
          else
            echo "404.html already present in out/"
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'deploy: ${{ github.sha }}'
