name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # 允许手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限，允许推送到 gh-pages
permissions:
  contents: write
  pages: write
  id-token: write

# 同一时间只允许一个部署任务运行
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4. 构建静态文件（Next.js output: 'export'）
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # 5. 添加 .nojekyll（防止 GitHub Pages 忽略 _next 目录）
      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      # 6. 部署到 gh-pages 分支
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'deploy: update GitHub Pages [${{ github.sha }}]'
