<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8d6e5"/>
      <stop offset="50%" style="stop-color:#a0b8cc"/>
      <stop offset="100%" style="stop-color:#8aa0b4"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.5)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Fridge body -->
  <rect x="80" y="60" width="352" height="392" rx="24" fill="url(#metal)" stroke="#7a8fa0" stroke-width="4"/>
  <!-- Fridge shine -->
  <rect x="80" y="60" width="352" height="392" rx="24" fill="url(#shine)"/>
  <!-- Fridge divider -->
  <rect x="80" y="235" width="352" height="8" fill="#8094a8"/>
  <!-- Handle top -->
  <rect x="392" y="100" width="14" height="80" rx="7" fill="#6b7d8a"/>
  <!-- Handle bottom -->
  <rect x="392" y="270" width="14" height="60" rx="7" fill="#6b7d8a"/>
  <!-- Badge 1: star (yellow) -->
  <circle cx="180" cy="155" r="38" fill="#f59e0b" stroke="#ffd700" stroke-width="3"/>
  <text x="180" y="168" font-size="38" text-anchor="middle" font-family="serif">⭐</text>
  <!-- Badge 2: circle (purple) -->
  <circle cx="280" cy="155" r="34" fill="#8b5cf6" stroke="#a78bfa" stroke-width="3"/>
  <text x="280" y="168" font-size="34" text-anchor="middle" font-family="serif">🐉</text>
  <!-- Badge 3: small (blue) -->
  <circle cx="370" cy="150" r="28" fill="#3b82f6" stroke="#60a5fa" stroke-width="3"/>
  <text x="370" y="161" font-size="26" text-anchor="middle" font-family="serif">🚀</text>
  <!-- Badge 4: bottom (green) -->
  <circle cx="210" cy="320" r="36" fill="#10b981" stroke="#34d399" stroke-width="3"/>
  <text x="210" y="333" font-size="34" text-anchor="middle" font-family="serif">🦊</text>
  <!-- Badge 5: bottom small -->
  <circle cx="320" cy="315" r="30" fill="#ec4899" stroke="#f472b6" stroke-width="3"/>
  <text x="320" y="327" font-size="28" text-anchor="middle" font-family="serif">🌸</text>
  <!-- Title text -->
  <text x="256" y="490" font-size="36" text-anchor="middle" font-family="sans-serif" fill="#f59e0b" font-weight="bold">🧊 徽章收集</text>
</svg>
